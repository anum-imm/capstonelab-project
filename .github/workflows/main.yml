# Lab 10: Agentic CI — quality gate on every push to main.
# Repo secret required: OPENAI_API_KEY

name: CI Eval Gate

on:
  push:
    branches:
      - main

jobs:
  evaluate-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Headless refunds (no stdin in CI)
      AUTO_APPROVE_REFUNDS: "true"
      # Optional: suppress LangSmith upload noise in Actions if key unused
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run headless evaluation gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_eval.py

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-eval-reports
          path: |
            evaluation_report.md
            reports/evaluation_results.json
