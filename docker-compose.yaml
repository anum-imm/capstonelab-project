services:
  agent:
    build: .
    container_name: capstonelab-agent
    ports:
      - "8000:8000"
    # Load keys from project .env at runtime (not baked into the image — see .dockerignore).
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-capstonelab}
      # Optional: point app at Qdrant when you migrate off local FAISS
      QDRANT_URL: http://vector_db:6333
    volumes:
      # Persist orders, shipping CSV, policy text, FAISS index (not copied into image when excluded)
      - ./data:/app/data
    depends_on:
      - vector_db
    networks:
      - app-net

  vector_db:
    image: qdrant/qdrant:latest
    container_name: capstonelab-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app-net

volumes:
  qdrant_storage:

networks:
  app-net:
    driver: bridge
